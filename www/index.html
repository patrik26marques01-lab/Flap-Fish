<script>
window.onerror = function(msg, url, line) { 
  document.body.innerHTML = '<div style="color:#fff;background:#900;padding:20px;font-size:16px;text-align:center;">ERRO: ' + msg + ' (linha ' + line + ')</div>'; 
  return true; 
};

/* AUDIO SYNTHESIZER */
const AudioFx = {
  ctx: null,
  init() {
    try {
      if (!this.ctx) {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        if (AudioContext) this.ctx = new AudioContext();
      }
      if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    } catch(e) { console.log('Audio error:', e); }
  },
  playFlap() {
    try {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(160, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400, this.ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.08);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.08);
    } catch(e){}
  },
  playCoin() {
    try {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(987.77, this.ctx.currentTime);
      osc.frequency.setValueAtTime(1318.51, this.ctx.currentTime + 0.08);
      gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.25);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.25);
    } catch(e){}
  },
  playHit() {
    try {
      if (!this.ctx) return;
      const osc = this.ctx.createOscillator();
      const gain = this.ctx.createGain();
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(140, this.ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(40, this.ctx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, this.ctx.currentTime);
      gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.2);
      osc.connect(gain); gain.connect(this.ctx.destination);
      osc.start(); osc.stop(this.ctx.currentTime + 0.2);
    } catch(e){}
  }
};

const CONFIG = {
  gravity: 0.21,
  flapForce: -5.3,
  maxFallSpeed: 7.5,
  gapBase: 210,
  gapMin: 155,
  speedBase: 2.0,
  speedMax: 3.5,
  spacing: 250,
  difficultyRampScore: 20,
  groundHeight: 65
};

const SKINS = [
  { id: 'clown', name: 'Nemo', price: 0, bodyGrad: ['#ffcf6e', '#ff8500'], finColor: '#ff6200' },
  { id: 'gold', name: 'Rei Dourado', price: 50, bodyGrad: ['#fff4a3', '#ffd700'], finColor: '#ffaa00' },
  { id: 'cyber', name: 'Neon Cyber', price: 120, bodyGrad: ['#5fe0ff', '#0077ff'], finColor: '#aa00ff' },
  { id: 'shark', name: 'Tubarãozinho', price: 250, bodyGrad: ['#a0b2c6', '#4a627a'], finColor: '#2d3e50' }
];

const store = {
  get(key, def) {
    try { const v = localStorage.getItem(key); return v === null ? def : JSON.parse(v); }
    catch(e){ return def; }
  },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e){} }
};

let state = {
  best: store.get('flapfish_best', 0),
  coins: store.get('flapfish_coins', 0),
  activeSkin: store.get('flapfish_skin', 'clown'),
  unlockedSkins: store.get('flapfish_unlocked', ['clown'])
};

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let particles = [];
function addBubbleParticle(x, y) {
  particles.push({
    x, y, vx: -1 - Math.random() * 1.5, vy: (Math.random() - 0.5) * 1.2,
    r: 2 + Math.random() * 4, alpha: 0.8, type: 'bubble'
  });
}

function addSparkleParticle(x, y) {
  for(let i=0; i<8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
      r: 2 + Math.random() * 3, alpha: 1, color: '#ffe27a', type: 'sparkle'
    });
  }
}

function updateDrawParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.alpha -= 0.02;
    if (p.alpha <= 0) { particles.splice(i, 1); continue; }
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.alpha);
    if (p.type === 'bubble') {
      ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
}

let bgBubbles = [];
function initBgBubbles() {
  bgBubbles = [];
  for (let i = 0; i < 20; i++) {
    bgBubbles.push({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: 2 + Math.random() * 6, speed: 0.3 + Math.random() * 0.8, drift: (Math.random() - 0.5) * 0.5
    });
  }
}
initBgBubbles();

function updateDrawBgBubbles() {
  bgBubbles.forEach(b => {
    b.y -= b.speed;
    b.x += Math.sin(b.y * 0.02) * b.drift;
    if (b.y < -10) { b.y = canvas.height + 10; b.x = Math.random() * canvas.width; }
    ctx.save(); ctx.globalAlpha = 0.25; ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2); ctx.stroke(); ctx.restore();
  });
}

let bgOffset = 0;
function drawWater() {
  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, '#1da3d0'); grad.addColorStop(0.5, '#0b5f8a'); grad.addColorStop(1, '#032338');
  ctx.fillStyle = grad; ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawSeabed() {
  const y = canvas.height - CONFIG.groundHeight;
  const grad = ctx.createLinearGradient(0, y, 0, canvas.height);
  grad.addColorStop(0, '#d1b46a'); grad.addColorStop(1, '#8c7032');
  ctx.fillStyle = grad; ctx.fillRect(0, y, canvas.width, CONFIG.groundHeight);
}

let fish = { x: 0, y: 0, vy: 0, r: 17, rot: 0, finT: 0, blinkTimer: 0 };
let obstacles = [], coinsList = [], score = 0, difficultyLevel = 0, gameRunning = false;

function resetGame() {
  fish = { x: canvas.width * 0.28, y: canvas.height / 2, vy: 0, r: 17, rot: 0, finT: 0, blinkTimer: 0 };
  obstacles = []; coinsList = []; particles = [];
  score = 0; difficultyLevel = 0;
  spawnObstacle();
}

function spawnObstacle() {
  const gap = Math.max(CONFIG.gapBase - difficultyLevel * 5, CONFIG.gapMin);
  const playableH = canvas.height - CONFIG.groundHeight;
  const margin = 60;
  const gapY = margin + Math.random() * (playableH - margin * 2 - gap);
  const coralColor = ['#e0507a', '#3ec6f0', '#9b51e0', '#f2994a'][Math.floor(Math.random() * 4)];
  
  obstacles.push({ x: canvas.width + 40, gapY, gap, passed: false, w: 62, color: coralColor });

  if (Math.random() < 0.6) {
    coinsList.push({ x: canvas.width + 40 + 31, y: gapY + gap / 2, r: 10, collected: false, rot: 0 });
  }
}

function obstacleSpeed() { return Math.min(CONFIG.speedBase + difficultyLevel * 0.15, CONFIG.speedMax); }

function flap() {
  AudioFx.init();
  if (!gameRunning) return;
  fish.vy = CONFIG.flapForce;
  fish.finT = 1;
  AudioFx.playFlap();
  addBubbleParticle(fish.x - fish.r, fish.y);
  if (navigator.vibrate) navigator.vibrate(12);
}

function updateGame() {
  bgOffset += 1;
  if (!gameRunning) return;

  fish.vy += CONFIG.gravity;
  fish.vy = Math.min(fish.vy, CONFIG.maxFallSpeed);
  fish.y += fish.vy;
  fish.rot = Math.max(-28, Math.min(65, fish.vy * 3.8));
  fish.finT = Math.max(0, fish.finT - 0.05);

  const speed = obstacleSpeed();
  const playableH = canvas.height - CONFIG.groundHeight;

  obstacles.forEach(o => o.x -= speed);
  if (obstacles.length && obstacles[obstacles.length - 1].x < canvas.width - CONFIG.spacing) spawnObstacle();
  obstacles = obstacles.filter(o => o.x > -90);

  coinsList.forEach(c => {
    c.x -= speed;
    if (!c.collected) {
      const dist = Math.hypot(fish.x - c.x, fish.y - c.y);
      if (dist < fish.r + c.r) {
        c.collected = true;
        state.coins++;
        store.set('flapfish_coins', state.coins);
        document.getElementById('coinCount').textContent = '🪙 ' + state.coins;
        AudioFx.playCoin();
        addSparkleParticle(c.x, c.y);
      }
    }
  });
  coinsList = coinsList.filter(c => c.x > -40);

  if (fish.y - fish.r < 0 || fish.y + fish.r > playableH) { return endGame(); }

  let hit = false;
  obstacles.forEach(o => {
    if (!o.passed && o.x + o.w < fish.x - fish.r) {
      o.passed = true;
      score++;
      if (score % CONFIG.difficultyRampScore === 0) difficultyLevel++;
      addSparkleParticle(fish.x, fish.y);
    }
    const inX = fish.x + fish.r > o.x && fish.x - fish.r < o.x + o.w;
    const inGapTop = fish.y - fish.r < o.gapY;
    const inGapBottom = fish.y + fish.r > o.gapY + o.gap;
    if (inX && (inGapTop || inGapBottom)) hit = true;
  });

  if (hit) return endGame();

  const scoreEl = document.getElementById('scoreDisplay');
  if (scoreEl.textContent != score) {
    scoreEl.textContent = score;
  }
}

function endGame() {
  gameRunning = false;
  AudioFx.playHit();
  if (navigator.vibrate) navigator.vibrate([40, 60, 40]);

  const isNewRecord = score > state.best;
  if (isNewRecord) { state.best = score; store.set('flapfish_best', state.best); }
  document.getElementById('bestCount').textContent = '🏆 ' + state.best;

  document.getElementById('scoreDisplay').classList.add('hidden');
  document.getElementById('finalScoreVal').textContent = score;
  document.getElementById('finalBestVal').textContent = state.best;
  document.getElementById('newRecord').classList.toggle('hidden', !isNewRecord);
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

function drawFish() {
  const currentSkin = SKINS.find(s => s.id === state.activeSkin) || SKINS[0];
  ctx.save();
  ctx.translate(fish.x, fish.y);
  ctx.rotate(fish.rot * Math.PI / 180);
  const r = fish.r;
  
  ctx.fillStyle = currentSkin.finColor;
  ctx.beginPath(); ctx.ellipse(-r*0.8, 0, r*0.5, r*0.3, 0, 0, Math.PI*2); ctx.fill();

  const bodyGrad = ctx.createRadialGradient(-r * 0.2, -r * 0.3, 2, 0, 0, r * 1.2);
  bodyGrad.addColorStop(0, currentSkin.bodyGrad[0]);
  bodyGrad.addColorStop(1, currentSkin.bodyGrad[1]);
  ctx.fillStyle = bodyGrad;
  ctx.beginPath(); ctx.ellipse(0, 0, r * 0.98, r * 0.72, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(r * 0.38, -r * 0.12, r * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath(); ctx.arc(r * 0.48, -r * 0.12, r * 0.14, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

function drawObstacles() {
  const playableH = canvas.height - CONFIG.groundHeight;
  obstacles.forEach(o => {
    ctx.fillStyle = o.color;
    ctx.fillRect(o.x, 0, o.w, o.gapY);
    ctx.fillRect(o.x, o.gapY + o.gap, o.w, playableH - (o.gapY + o.gap));
  });
}

function drawCoins() {
  coinsList.forEach(c => {
    if (c.collected) return;
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
  });
}

function loop() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawWater();
  updateDrawBgBubbles();
  updateGame();
  drawSeabed();
  drawObstacles();
  drawCoins();
  updateDrawParticles();
  drawFish();
  requestAnimationFrame(loop);
}

function renderShop() {
  const grid = document.getElementById('shopGrid');
  grid.innerHTML = '';
  SKINS.forEach(skin => {
    const isUnlocked = state.unlockedSkins.includes(skin.id);
    const isSelected = state.activeSkin === skin.id;
    const item = document.createElement('div');
    item.className = `shopItem ${isSelected ? 'selected' : ''}`;
    item.innerHTML = `
      <div class="shopItemName">${skin.name}</div>
      <div class="shopItemPrice">${isSelected ? 'EM USO' : (isUnlocked ? 'POSSUI' : '🪙 ' + skin.price)}</div>
    `;
    item.onclick = (e) => {
      e.stopPropagation();
      if (isUnlocked) {
        state.activeSkin = skin.id;
        store.set('flapfish_skin', skin.id);
      } else if (state.coins >= skin.price) {
        state.coins -= skin.price;
        state.unlockedSkins.push(skin.id);
        state.activeSkin = skin.id;
        store.set('flapfish_coins', state.coins);
        store.set('flapfish_unlocked', state.unlockedSkins);
        store.set('flapfish_skin', skin.id);
        document.getElementById('coinCount').textContent = '🪙 ' + state.coins;
      }
      renderShop();
    };
    grid.appendChild(item);
  });
}

document.getElementById('bestCount').textContent = '🏆 ' + state.best;
document.getElementById('coinCount').textContent = '🪙 ' + state.coins;

function startGame() {
  AudioFx.init();
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('scoreDisplay').classList.remove('hidden');
  resetGame();
  gameRunning = true;
}

/* EVENTOS DE CLIQUE CORRIGIDOS (Usa apenas 'click' simples para evitar conflito) */
document.getElementById('playBtn').onclick = function(e) {
  e.stopPropagation();
  startGame();
};

document.getElementById('restartBtn').onclick = function(e) {
  e.stopPropagation();
  startGame();
};

document.getElementById('menuBtn').onclick = function(e) {
  e.stopPropagation();
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
};

document.getElementById('shopBtn').onclick = function(e) {
  e.stopPropagation();
  renderShop();
  document.getElementById('menuScreen').classList.add('hidden');
  document.getElementById('shopScreen').classList.remove('hidden');
};

document.getElementById('closeShopBtn').onclick = function(e) {
  e.stopPropagation();
  document.getElementById('shopScreen').classList.add('hidden');
  document.getElementById('menuScreen').classList.remove('hidden');
};

/* TOQUE NA TELA PARA NADAR */
window.addEventListener('pointerdown', function(e) {
  if (gameRunning && e.target === canvas) {
    flap();
  }
});

requestAnimationFrame(loop);
</script>
